<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2>📝 Assignments</h2>
      <small class="text-muted">Manage and track student assignments</small>
    </div>

    <button class="btn btn-success" routerLink="/add-assignment">
      ➕ Add Assignment
    </button>
  </div>

  <div class="card shadow">

    <div class="card-body">

      <div class="table-responsive">

        <table class="table table-hover table-bordered align-middle">

          <thead class="table-primary">
            <tr>
              <th>#</th>
              <th>Title</th>
              <th>Course</th>
              <th>Faculty</th>
              <th>Due Date</th>
              <th>Status</th>
              <th width="180">Action</th>
            </tr>
          </thead>

          <tbody>

            <tr *ngFor="let assignment of assignments; let i=index">

              <td>{{i+1}}</td>

              <td>{{assignment.title}}</td>

              <td>{{assignment.courseName}}</td>

              <td>{{assignment.faculty}}</td>

              <td>{{assignment.dueDate | date}}</td>

              <td>
                <span
                  class="badge"
                  [ngClass]="{
                    'bg-warning': assignment.status=='Pending',
                    'bg-success': assignment.status=='Submitted',
                    'bg-danger': assignment.status=='Overdue'
                  }">

                  {{assignment.status}}

                </span>
              </td>

              <td>

                <button
                  class="btn btn-primary btn-sm me-2"
                  (click)="editAssignment(assignment)">
                  Edit
                </button>

                <button
                  class="btn btn-danger btn-sm"
                  (click)="deleteAssignment(assignment.id)">
                  Delete
                </button>

              </td>

            </tr>

            <tr *ngIf="assignments.length==0">
              <td colspan="7" class="text-center text-muted">
                No Assignments Found
              </td>
            </tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>

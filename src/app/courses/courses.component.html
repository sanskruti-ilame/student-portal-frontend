<div class="container mt-4">

<h2 class="mb-3">Course Management</h2>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>Course Code</th>

<th>Course Name</th>

<th>Faculty</th>

<th>Credits</th>

</tr>

</thead>

<tbody>

<tr *ngFor="let c of courses">

<td>{{c.code}}</td>

<td>{{c.name}}</td>

<td>{{c.faculty}}</td>

<td>{{c.credits}}</td>

</tr>

</tbody>

</table>

</div>

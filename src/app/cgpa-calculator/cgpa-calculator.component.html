<div class="container py-4">

  <div class="card shadow border-0 rounded-4">

    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">
        📊 CGPA & Attendance Calculator
      </h4>
    </div>

    <div class="card-body">

      <!-- CGPA Calculator -->

      <h5 class="text-primary mb-3">
        🎓 CGPA Calculator
      </h5>

      <div class="mb-3">
        <label class="form-label">
          Current CGPA
        </label>

        <input
          type="number"
          class="form-control"
          [(ngModel)]="currentCgpa"
          placeholder="Enter current CGPA">
      </div>

      <div class="mb-3">
        <label class="form-label">
          Expected Percentage
        </label>

        <input
          type="number"
          class="form-control"
          [(ngModel)]="percentage"
          placeholder="Enter expected percentage">
      </div>

      <button
        class="btn btn-success"
        (click)="calculate()">
        Calculate
      </button>

      <div
        class="alert alert-info mt-4"
        *ngIf="result">

        Expected CGPA:
        <b>{{ result }}</b>

      </div>

      <hr class="my-5">

      <!-- Attendance Calculator -->

      <h5 class="text-primary mb-3">
        📅 75% Attendance Calculator
      </h5>

      <div class="mb-3">
        <label class="form-label">
          Total Classes Conducted
        </label>

        <input
          type="number"
          class="form-control"
          [(ngModel)]="totalClasses"
          placeholder="Enter total classes">
      </div>

      <div class="mb-3">
        <label class="form-label">
          Classes Attended
        </label>

        <input
          type="number"
          class="form-control"
          [(ngModel)]="attendedClasses"
          placeholder="Enter attended classes">
      </div>

      <button
        class="btn btn-primary"
        (click)="calculate()">
        Calculate Attendance
      </button>

      <div
        class="alert alert-success mt-4"
        *ngIf="attendancePercentage !== null">

        <h5>
          Current Attendance: {{ attendancePercentage }}%
        </h5>

        <p class="mb-0">
          {{ attendanceMessage }}
        </p>

      </div>

    </div>

  </div>

</div>

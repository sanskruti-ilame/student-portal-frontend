<div class="container mt-4">

  <div class="card shadow">

    <div class="card-header bg-warning">
      <h3>Edit Student</h3>
    </div>

    <div class="card-body">

      <div class="row">

        <div class="col-md-6 mb-3">
          <label>Name</label>
          <input type="text" class="form-control" [(ngModel)]="student.name">
        </div>

        <div class="col-md-6 mb-3">
          <label>Department</label>
          <input type="text" class="form-control" [(ngModel)]="student.department">
        </div>

        <div class="col-md-6 mb-3">
          <label>Semester</label>
          <input type="text" class="form-control" [(ngModel)]="student.semester">
        </div>

        <div class="col-md-6 mb-3">
          <label>Branch</label>
          <input type="text" class="form-control" [(ngModel)]="student.branch">
        </div>

        <div class="col-md-6 mb-3">
          <label>Subjects</label>
          <input type="text" class="form-control" [(ngModel)]="student.subjects">
        </div>

        <div class="col-md-6 mb-3">
          <label>CGPA</label>
          <input type="number" class="form-control" [(ngModel)]="student.cgpa">
        </div>

        <div class="col-md-6 mb-3">
          <label>Internal Marks</label>
          <input type="number" class="form-control" [(ngModel)]="student.internalMarks">
        </div>

        <div class="col-md-6 mb-3">
          <label>Attendance (%)</label>
          <input type="number" class="form-control" [(ngModel)]="student.attendance">
        </div>

        <div class="col-md-6 mb-3">
          <label>Status</label>
          <select class="form-select" [(ngModel)]="student.status">
            <option>Active</option>
            <option>Inactive</option>
          </select>
        </div>

      </div>

      <button class="btn btn-success me-2" (click)="updateStudent()">
        Update Student
      </button>

      <button class="btn btn-secondary" routerLink="/students">
        Cancel
      </button>

    </div>

  </div>

</div>
